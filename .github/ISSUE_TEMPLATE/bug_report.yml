name: Bug report
description: Report a reproducible defect in hallx.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please provide enough detail to reproduce the issue quickly.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the bug.
      placeholder: Hallx returns high confidence for clearly invalid output.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide exact steps and code snippet if possible.
      placeholder: |
        1. Initialize Hallx with ...
        2. Call checker.check(...)
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: The check should return medium/high risk with an issue.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: The check returned low risk and no actionable issue.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Paste traceback, logs, and result payloads.
      render: shell
  - type: input
    id: version
    attributes:
      label: Hallx version
      placeholder: 1.0.2
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: 3.11.9
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Ubuntu 22.04 / Windows 11 / macOS 14
    validations:
      required: true
