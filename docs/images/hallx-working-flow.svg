<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Hallx Working Flow (Hand-drawn Black and White)</title>
  <desc id="desc">Excalidraw-style black and white workflow for Hallx scoring, policy, feedback, and calibration loop.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .ink {
        fill: #111111;
        font-family: "Comic Sans MS", "Segoe Print", "Bradley Hand", cursive;
      }
      .title { font-size: 44px; font-weight: 700; }
      .subtitle { font-size: 20px; }
      .head { font-size: 27px; font-weight: 700; }
      .body { font-size: 19px; }
      .small { font-size: 16px; }
      .box {
        fill: #ffffff;
        stroke: #111111;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .chip {
        fill: #ffffff;
        stroke: #111111;
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .arrow {
        fill: none;
        stroke: #111111;
        stroke-width: 3;
        stroke-linecap: round;
      }
      .loop {
        fill: none;
        stroke: #111111;
        stroke-width: 3;
        stroke-dasharray: 8 7;
        stroke-linecap: round;
      }
    </style>
    <marker id="ah" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 L2.5,5.5 z" fill="#111111"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="980"/>

  <text class="ink title" x="52" y="78">Hallx End-to-End Working Flow</text>
  <text class="ink subtitle" x="52" y="112">Heuristic risk scoring, policy action, and feedback-driven calibration</text>

  <!-- Top row -->
  <rect class="box" x="50" y="160" width="280" height="165" rx="16"/>
  <text class="ink head" x="70" y="205">1) Input</text>
  <text class="ink body" x="70" y="240">Prompt</text>
  <text class="ink body" x="70" y="267">Optional context</text>
  <text class="ink body" x="70" y="294">Optional schema</text>

  <rect class="box" x="370" y="160" width="280" height="165" rx="16"/>
  <text class="ink head" x="390" y="205">2) LLM Generate</text>
  <text class="ink body" x="390" y="240">Adapter / callable</text>
  <text class="ink body" x="390" y="267">returns response</text>

  <rect class="box" x="690" y="130" width="460" height="225" rx="18"/>
  <text class="ink head" x="710" y="178">3) Hallx Analysis</text>
  <rect class="chip" x="710" y="198" width="118" height="38" rx="10"/>
  <text class="ink small" x="736" y="223">Schema</text>
  <rect class="chip" x="842" y="198" width="148" height="38" rx="10"/>
  <text class="ink small" x="868" y="223">Consistency</text>
  <rect class="chip" x="1002" y="198" width="128" height="38" rx="10"/>
  <text class="ink small" x="1028" y="223">Grounding</text>
  <text class="ink body" x="710" y="274">Produces per-signal scores</text>
  <text class="ink body" x="710" y="302">and issue diagnostics</text>

  <rect class="box" x="1190" y="160" width="360" height="165" rx="16"/>
  <text class="ink head" x="1210" y="205">4) Confidence + Risk</text>
  <text class="ink body" x="1210" y="240">Weighted score</text>
  <text class="ink body" x="1210" y="267">high / medium / low</text>
  <text class="ink small" x="1210" y="295">&lt;0.40 high, &lt;0.75 medium</text>

  <!-- Bottom row -->
  <rect class="box" x="170" y="430" width="320" height="170" rx="16"/>
  <text class="ink head" x="190" y="476">5) Policy Action</text>
  <text class="ink body" x="190" y="510">Use recommendation</text>
  <text class="ink body" x="190" y="537">proceed / retry</text>
  <text class="ink body" x="190" y="564">optional strict block</text>

  <rect class="box" x="560" y="430" width="460" height="170" rx="16"/>
  <text class="ink head" x="580" y="476">6) Review + Feedback Storage</text>
  <text class="ink body" x="580" y="510">Label as correct / hallucinated</text>
  <text class="ink body" x="580" y="537">record_outcome(...)</text>
  <text class="ink small" x="580" y="564">Stored in SQLite (device/server path)</text>

  <rect class="box" x="1090" y="430" width="390" height="170" rx="16"/>
  <text class="ink head" x="1110" y="476">7) Calibration Report</text>
  <text class="ink body" x="1110" y="510">calibration_report(...)</text>
  <text class="ink body" x="1110" y="537">suggested threshold</text>
  <text class="ink body" x="1110" y="564">risk-level breakdown</text>

  <rect class="box" x="440" y="700" width="720" height="140" rx="16"/>
  <text class="ink head" x="460" y="748">8) Continuous Improvement Loop</text>
  <text class="ink body" x="460" y="782">Tune runtime policy with reviewed outcomes and rerun the pipeline.</text>

  <!-- Flow arrows -->
  <path class="arrow" d="M330 242 L370 242" marker-end="url(#ah)"/>
  <path class="arrow" d="M650 242 L690 242" marker-end="url(#ah)"/>
  <path class="arrow" d="M1150 242 L1190 242" marker-end="url(#ah)"/>
  <path class="arrow" d="M1370 325 L1370 392 L330 392 L330 430" marker-end="url(#ah)"/>
  <path class="arrow" d="M490 515 L560 515" marker-end="url(#ah)"/>
  <path class="arrow" d="M1020 515 L1090 515" marker-end="url(#ah)"/>
  <path class="arrow" d="M1285 600 L1285 700 L1160 700" marker-end="url(#ah)"/>
  <path class="loop" d="M440 770 C300 760, 240 660, 240 600" marker-end="url(#ah)"/>

  <text class="ink small" x="52" y="920">Default feedback DB path: HALLX_FEEDBACK_DB or OS-specific app-data directory.</text>
</svg>
