<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Hallx Working Flow (Excalidraw Style)</title>
  <desc id="desc">A hand-drawn style diagram showing prompt, LLM response, Hallx checks, confidence score, and risk output.</desc>
  <defs>
    <style>
      .bg { fill: #fffdf8; }
      .box {
        fill: #fffefb;
        stroke: #1f2937;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .ink { fill: #111827; font-family: "Virgil", "Comic Sans MS", cursive; }
      .title { font-size: 36px; font-weight: 700; }
      .label { font-size: 24px; font-weight: 700; }
      .small { font-size: 20px; }
      .arrow { stroke: #111827; stroke-width: 3; fill: none; stroke-linecap: round; }
      .accent1 { fill: #fef3c7; }
      .accent2 { fill: #dbeafe; }
      .accent3 { fill: #dcfce7; }
      .accent4 { fill: #fee2e2; }
      .accent5 { fill: #ede9fe; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 L3,6 z" fill="#111827"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="900"/>
  <text class="ink title" x="460" y="70">Hallx: Confidence + Risk Pipeline</text>

  <g>
    <rect class="box accent2" x="70" y="160" width="280" height="120" rx="16"/>
    <rect class="box accent2" x="74" y="164" width="280" height="120" rx="16" opacity="0.55"/>
    <text class="ink label" x="140" y="215">1) Prompt</text>
    <text class="ink small" x="105" y="250">"Who won Nobel 2027?"</text>
  </g>

  <g>
    <rect class="box accent1" x="430" y="145" width="330" height="150" rx="18"/>
    <rect class="box accent1" x="434" y="149" width="330" height="150" rx="18" opacity="0.55"/>
    <text class="ink label" x="510" y="200">2) OpenAIAdapter</text>
    <text class="ink small" x="475" y="235">`agenerate(prompt)`</text>
    <text class="ink small" x="470" y="265">returns LLM response</text>
  </g>

  <g>
    <rect class="box accent3" x="860" y="145" width="460" height="560" rx="20"/>
    <rect class="box accent3" x="864" y="149" width="460" height="560" rx="20" opacity="0.55"/>
    <text class="ink label" x="1010" y="195">3) Hallx.check_async</text>

    <rect class="box accent5" x="900" y="230" width="380" height="110" rx="14"/>
    <text class="ink label" x="940" y="275">Schema Check</text>
    <text class="ink small" x="930" y="310">JSON shape / required fields</text>

    <rect class="box accent5" x="900" y="365" width="380" height="110" rx="14"/>
    <text class="ink label" x="930" y="410">Consistency Check</text>
    <text class="ink small" x="930" y="445">Repeated runs -> variance score</text>

    <rect class="box accent5" x="900" y="500" width="380" height="150" rx="14"/>
    <text class="ink label" x="955" y="545">Grounding Check</text>
    <text class="ink small" x="930" y="580">With context: claim vs evidence</text>
    <text class="ink small" x="930" y="610">No context: check skipped</text>
    <text class="ink small" x="930" y="640">issue added to report</text>
  </g>

  <g>
    <rect class="box accent4" x="430" y="420" width="330" height="140" rx="18"/>
    <rect class="box accent4" x="434" y="424" width="330" height="140" rx="18" opacity="0.55"/>
    <text class="ink label" x="465" y="470">4) Confidence Aggregation</text>
    <text class="ink small" x="475" y="505">weighted schema/consistency/</text>
    <text class="ink small" x="555" y="535">grounding</text>
  </g>

  <g>
    <rect class="box accent2" x="430" y="620" width="330" height="180" rx="18"/>
    <rect class="box accent2" x="434" y="624" width="330" height="180" rx="18" opacity="0.55"/>
    <text class="ink label" x="520" y="670">5) Output</text>
    <text class="ink small" x="470" y="710">confidence: 0.00 - 1.00</text>
    <text class="ink small" x="470" y="740">risk: high / medium / low</text>
    <text class="ink small" x="470" y="770">issues + recommendation</text>
  </g>

  <path class="arrow" d="M350 220 C390 220, 400 220, 430 220" marker-end="url(#arrowhead)"/>
  <path class="arrow" d="M760 220 C800 220, 810 220, 860 220" marker-end="url(#arrowhead)"/>
  <path class="arrow" d="M1090 705 C1090 740, 800 750, 760 750" marker-end="url(#arrowhead)"/>
  <path class="arrow" d="M595 295 C595 350, 595 370, 595 420" marker-end="url(#arrowhead)"/>
  <path class="arrow" d="M595 560 C595 590, 595 600, 595 620" marker-end="url(#arrowhead)"/>
  <path class="arrow" d="M760 490 C820 490, 830 490, 860 490" marker-end="url(#arrowhead)"/>

  <text class="ink small" x="80" y="855">With context -> stronger grounding signal | Without context -> grounding skipped, rely on consistency/schema.</text>
</svg>
